<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Lista zadań</title>
  </head>
  <body>
    <h1>Lista zadań</h1>

    {% if tasks %}
    <ul>
      {% for task in tasks %}
      <li>
        <a href="{% url 'task_detail' task.pk %}"> {{task.title}} </a>
        | status: {{task.status}} | projekt: {{task.project}} | termin:
        {{task.due_date}}
      </li>
      {%endfor%}
    </ul>

    {%else%}
    <p>Brak zadań</p>
    {%endif%}
  </body>
</html>
